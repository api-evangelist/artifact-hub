aid: artifact-hub
name: Artifact Hub
description: >-
  Artifact Hub is a CNCF incubating web-based application that enables
  finding, installing, and publishing cloud-native packages. It supports
  Helm charts, OPA policies, Falco rules, OLM operators, Tinkerbell actions,
  kubectl plugins, Tekton tasks, KEDA scalers, CoreDNS plugins, and more.
  Artifact Hub provides a searchable catalog with versioning, security
  reports, and changelog tracking.
url: https://artifacthub.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Package Registry
- Helm Charts
- Discovery
- Cloud Native
- Incubating
created: '2026-03-16'
modified: '2026-03-16'
specificationVersion: '0.19'
type: Index
apis:
- aid: artifact-hub:artifact-hub-api
  name: Artifact Hub API
  description: >-
    The Artifact Hub API provides RESTful endpoints for searching and
    retrieving cloud-native packages, managing repositories, handling
    user subscriptions and webhooks, and administering organizations. It
    supports filtering by package kind, repository, organization, and
    various metadata attributes. The API enables programmatic access to
    the full Artifact Hub catalog.
  humanURL: https://artifacthub.io/docs/api/
